<head>

 <link rel="stylesheet" href="style.css">

<header>

    <h2 id="clinicName">عيادة الشفاء</h2>

    <nav>
        <a href="index.html" id="homeLink">الرئيسية</a>
        <a href="about.html" id="aboutLink">من نحن</a>
        <a href="services.html" id="servicesLink">الخدمات</a>
        <a href="doctor.html" id="doctorLink">الدكتور</a>

<section class="doctor-section">

    <div class="doctor-container">

        <img src="./images/doctor.jpg"
             alt="Doctor Ehab Mahmoud"

        <div class="doctor-info">

            <h2 id="doctorName">
                د. إيهاب محمود
            </h2>


            <h3 id="doctorSpecialty">
                استشاري طب وجراحة الأسنان
            </h3>


            <p id="doctorDescription">
                يتمتع الدكتور إيهاب محمود بخبرة في مجال طب الأسنان،
                ويحرص على تقديم أفضل رعاية للمرضى باستخدام أحدث
                الأجهزة والتقنيات الحديثة، مع الاهتمام براحة المريض
                وجودة العلاج.
            </p>


            <a href="booking.html" class="btn" id="bookingBtn">
                احجز موعد
            </a>

        </div>

    </div>
