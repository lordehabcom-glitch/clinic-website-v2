<section class="booking-section">

    <h2>احجز موعدك</h2>

    <form class="booking-form">

        <label>الاسم <span style="color:red">*</span></label>
<input type="text" id="name" placeholder="الاسم بالكامل" required>

<label>الهاتف <span style="color:red">*</span></label>
<input type="tel" id="phone" placeholder="+20**********" required>

<label>السن</label>
<input type="number" id="age" placeholder="السن">

<label>التاريخ <span style="color:red">*</span></label>
<input type="date" id="date" required>
<label>الخدمة</label>
<select id="service">
    <option value="">اختر الخدمة</option>
    <option>الكشف والتشخيص</option>
    <option>تبييض الأسنان</option>
    <option>الحشوات التجميلية</option>
    <option>علاج الجذور وحشو العصب</option>
    <option>تقويم الأسنان</option>
    <option>تركيبات وتيجان الأسنان</option>
    <option>تجميل وتصميم الابتسامة</option>
    <option>الفينير</option>
    <option>علاج اللثة وتنظيف الجير</option>
    <option>زراعة الأسنان</option>
    <option>خلع الأسنان وضروس العقل</option>
    <option>جراحة الوجه والفكين</option>
    <option>  الاطفال</option>
    <option value="other">خدمة أخرى</option>
</select>
<div id="otherServiceBox" style="display:none; margin-top:15px;">
    <label>اكتب اسم الخدمة</label>
    <input type="text" id="otherService" placeholder="اكتب الخدمة المطلوبة">
</div>
<label>الفرع <span style="color:red">*</span></label>

<select id="branch" required>
    <option value="">اختر الفرع</option>
    <option>فرع كفر سعد</option>
    <option>فرع دمياط الجديدة</option>
</select>


<label>وصف الحالة (اختياري)</label>

<textarea id="caseDescription" placeholder="اكتب وصف الحالة"></textarea>
<br><br>
        <button type="button" onclick="sendWhatsApp()">
            تأكيد الحجز
        </button>

    </form>

</section>
